<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nostalgic TV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:        #39ff14;
      --amber:        #ffb300;
      --cream:        #f5f0e8;
      --plastic-hi:   #d2d0ce;
      --plastic-mid:  #b8b6b4;
      --plastic-lo:   #9a9896;
      --plastic-dark: #6e6c6a;
      --plastic-edge: #4e4c4a;
    }

    body {
      background: #12100e;
      background-image:
        radial-gradient(ellipse at 25% 60%, #1e1a14 0%, transparent 55%),
        radial-gradient(ellipse at 75% 40%, #101410 0%, transparent 55%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      color: var(--cream);
      padding: 20px;
      gap: 14px;
    }

    /* ═══ TV SET ═══════════════════════════════════════════════════════════ */
    .tv-set { position: relative; width: min(920px, 100%); }

    .tv-body {
      display: flex;
      border-radius: 22px 22px 28px 28px;
      background-image:
        repeating-linear-gradient(93deg, transparent 0px, transparent 5px, rgba(0,0,0,0.025) 5px, rgba(0,0,0,0.025) 6px),
        linear-gradient(170deg, var(--plastic-hi) 0%, var(--plastic-mid) 25%, var(--plastic-lo) 60%, var(--plastic-dark) 100%);
      padding: 22px 18px 26px 22px;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.55),
        inset 2px 0 0 rgba(255,255,255,0.25),
        inset 0 -2px 0 rgba(0,0,0,0.35),
        0 8px 0 var(--plastic-edge),
        0 9px 2px rgba(0,0,0,0.6),
        6px 16px 40px rgba(0,0,0,0.85),
        0 30px 80px rgba(0,0,0,0.5);
    }

    /* ── Screen section ── */
    .screen-section { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .screen-housing {
      background: #1c1c1c;
      border-radius: 12px 12px 0 0;
      padding: 14px 14px 0;
      box-shadow: inset 0 4px 16px rgba(0,0,0,0.95), inset 0 0 0 1px #0a0a0a;
    }

    /* The element that goes fullscreen */
    #tv-screen {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 6px 6px 0 0;
      overflow: hidden;
      box-shadow:
        inset 4px 4px 30px rgba(0,0,0,0.9),
        inset -4px -4px 30px rgba(0,0,0,0.9),
        inset 0 0 60px rgba(0,0,0,0.5);
    }

    /* Scanlines */
    #tv-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none;
      z-index: 5;
      border-radius: 6px 6px 0 0;
    }

    /* CRT vignette */
    #tv-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 6;
      border-radius: 6px 6px 0 0;
    }

    /* ── Static canvas ── */
    #static-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      image-rendering: pixelated;
      display: none;
    }

    /* ── Player ── */
    #player-container {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    #player-container video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      border: none;
    }

    /* ── Phosphor glow ── */
    .screen-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      box-shadow: inset 0 0 40px rgba(50,200,80,0.04);
      border-radius: 6px;
    }

    /* ── Power On overlay ── */
    #power-on {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.3s;
    }
    #power-on:hover { background: #040404; }
    .power-symbol {
      font-size: 56px;
      color: rgba(57,255,20,0.35);
      text-shadow: 0 0 24px rgba(57,255,20,0.15);
      transition: all 0.25s;
      line-height: 1;
    }
    #power-on:hover .power-symbol {
      color: var(--green);
      text-shadow: 0 0 40px rgba(57,255,20,0.9), 0 0 80px rgba(57,255,20,0.3);
    }
    .power-label {
      font-size: 9px;
      letter-spacing: 5px;
      color: rgba(245,240,232,0.18);
      text-transform: uppercase;
    }
    #power-on:hover .power-label { color: rgba(245,240,232,0.5); }

    /* ── Signal Lost ── */
    #signal-lost {
      display: none;
      position: absolute;
      inset: 0;
      background: #000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      z-index: 15;
      border-radius: 6px;
    }
    #signal-lost.visible { display: flex; }
    .sl-icon { font-size: 32px; opacity: 0.35; }
    .sl-text { color: rgba(245,240,232,0.35); font-size: 11px; letter-spacing: 5px; }
    .sl-sub  { color: rgba(245,240,232,0.18); font-size: 9px; letter-spacing: 2px; }

    /* ── OSD: Channel number (shown briefly on channel change) ── */
    #osd-channel {
      position: absolute;
      top: 12px;
      right: 14px;
      z-index: 30;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(57,255,20,0.3);
      border-radius: 5px;
      padding: 6px 12px;
      display: none;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    #osd-channel.visible { display: flex; }
    .osd-ch-num  { font-size: 36px; font-weight: bold; color: var(--green); text-shadow: 0 0 12px rgba(57,255,20,0.8); line-height: 1; }
    .osd-ch-name { font-size: 9px; color: rgba(245,240,232,0.6); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

    /* ── OSD: Now Playing bottom bar ── */
    #osd-nowplaying {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 30;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      padding: 20px 14px 10px;
      display: none;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #osd-nowplaying.visible { display: block; }
    #osd-nowplaying.show    { opacity: 1; }
    .osd-np-inner { display: flex; align-items: center; gap: 8px; font-size: 11px; }
    .osd-np-ch   { background: var(--green); color: #000; font-weight: bold; font-size: 9px; padding: 2px 6px; border-radius: 2px; flex-shrink: 0; }
    .osd-np-show { color: rgba(245,240,232,0.5); flex-shrink: 0; }
    .osd-np-sep  { color: rgba(245,240,232,0.2); flex-shrink: 0; }
    .osd-np-title{ color: var(--cream); font-weight: bold; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .osd-np-year { color: rgba(245,240,232,0.3); flex-shrink: 0; }
    .osd-np-rem  { color: var(--amber); flex-shrink: 0; text-shadow: 0 0 6px rgba(255,179,0,0.4); }

    /* ── FULLSCREEN mode ── */
    #tv-screen:fullscreen,
    #tv-screen:-webkit-full-screen {
      width: 100vw !important;
      height: 100vh !important;
      aspect-ratio: unset !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    #tv-screen:fullscreen::before,
    #tv-screen:-webkit-full-screen::before,
    #tv-screen:fullscreen::after,
    #tv-screen:-webkit-full-screen::after { border-radius: 0; }

    /* Keep OSD visible in fullscreen */
    #tv-screen:fullscreen #osd-nowplaying.visible,
    #tv-screen:-webkit-full-screen #osd-nowplaying.visible { display: block; }

    /* ── Now-playing bar below screen ── */
    .now-playing-bar {
      background: #141414;
      border-top: 1px solid #2a2a2a;
      border-radius: 0 0 12px 12px;
      padding: 7px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(57,255,20,0.08);
    }
    .np-ch-badge { background: var(--green); color: #000; font-weight: bold; font-size: 9px; padding: 2px 6px; border-radius: 2px; letter-spacing: 1px; flex-shrink: 0; }
    .np-divider  { color: rgba(245,240,232,0.15); flex-shrink: 0; }
    .np-show     { color: rgba(245,240,232,0.5); flex-shrink: 0; }
    .np-title    { color: var(--cream); font-weight: bold; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np-year     { color: rgba(245,240,232,0.3); flex-shrink: 0; }
    .np-rem      { color: var(--amber); flex-shrink: 0; text-shadow: 0 0 6px rgba(255,179,0,0.4); }
    .skip-btn {
      background: none; border: none;
      color: rgba(245,240,232,0.2); font-size: 13px; cursor: pointer;
      padding: 0 2px; flex-shrink: 0; transition: color 0.15s; line-height: 1;
    }
    .skip-btn:hover { color: var(--amber); }

    /* ── Bottom strip ── */
    .tv-bottom-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 4px 0;
    }
    .brand-text { font-size: 11px; letter-spacing: 6px; color: rgba(0,0,0,0.3); text-transform: uppercase; text-shadow: 0 1px 0 rgba(255,255,255,0.4); }
    .bottom-btns { display: flex; gap: 6px; }
    .phys-btn-small {
      background: linear-gradient(170deg, var(--plastic-hi), var(--plastic-lo));
      border: none;
      border-bottom: 2px solid var(--plastic-edge);
      border-radius: 4px;
      color: rgba(0,0,0,0.5);
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      padding: 5px 10px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 2px 4px rgba(0,0,0,0.35);
      transition: all 0.08s;
      text-shadow: 0 1px 0 rgba(255,255,255,0.3);
    }
    .phys-btn-small:hover { background: linear-gradient(170deg, #dedddb, var(--plastic-mid)); color: rgba(0,0,0,0.65); }
    .phys-btn-small:active { transform: translateY(1px); border-bottom-width: 1px; }

    /* ═══ RIGHT CONTROL PANEL ══════════════════════════════════════════════ */
    .control-panel {
      width: 96px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 16px 10px 12px;
      margin-left: 16px;
      background: linear-gradient(180deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.04) 50%, rgba(0,0,0,0.1) 100%);
      border-radius: 8px;
      box-shadow:
        inset 1px 0 0 rgba(255,255,255,0.2),
        inset -1px 0 0 rgba(0,0,0,0.15),
        inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .ctrl-label { font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(0,0,0,0.5); text-shadow: 0 1px 0 rgba(255,255,255,0.4); text-align: center; margin-bottom: 5px; line-height: 1.2; }
    .ctrl-group { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 14px; }

    .phys-btn {
      width: 52px; height: 22px;
      background: linear-gradient(170deg, var(--plastic-hi), var(--plastic-lo));
      border: none; border-bottom: 3px solid var(--plastic-edge);
      border-radius: 4px;
      color: rgba(0,0,0,0.5);
      font-family: 'Courier New', monospace;
      font-size: 11px; font-weight: bold;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 2px 4px rgba(0,0,0,0.35);
      transition: all 0.08s;
      user-select: none;
      display: flex; align-items: center; justify-content: center;
    }
    .phys-btn:hover { background: linear-gradient(170deg, #dedddb, var(--plastic-mid)); }
    .phys-btn:active { transform: translateY(2px); border-bottom-width: 1px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.3); }

    .ch-pair { display: flex; flex-direction: column; gap: 4px; width: 100%; align-items: center; }

    /* Channel LED display */
    .channel-display {
      width: 64px; background: #0c0c0c; border-radius: 5px;
      padding: 5px 6px 4px; text-align: center; margin-bottom: 14px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.9), 0 0 0 1px #080808, 0 0 10px rgba(57,255,20,0.08);
    }
    .ch-led-label  { font-size: 7px; letter-spacing: 2px; color: rgba(57,255,20,0.45); text-transform: uppercase; margin-bottom: 2px; }
    .ch-led-number { font-size: 28px; font-weight: bold; color: var(--green); text-shadow: 0 0 8px rgba(57,255,20,0.9), 0 0 20px rgba(57,255,20,0.4); line-height: 1; letter-spacing: -1px; }

    .knob-section { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: 2px; }
    .knob-label   { font-size: 7px; letter-spacing: 1.5px; color: rgba(0,0,0,0.5); text-transform: uppercase; text-shadow: 0 1px 0 rgba(255,255,255,0.4); }
    .knob {
      width: 52px; height: 52px;
      background: radial-gradient(circle at 38% 32%, var(--plastic-hi), #606060 70%);
      border-radius: 50%;
      border: 2px solid var(--plastic-edge);
      box-shadow: 0 4px 10px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.4), inset 0 2px 4px rgba(255,255,255,0.25), inset 0 -2px 4px rgba(0,0,0,0.4);
      cursor: pointer;
      position: relative;
      transition: transform 0.25s ease;
    }
    .knob::after {
      content: '';
      position: absolute;
      top: 7px; left: 50%;
      transform: translateX(-50%);
      width: 5px; height: 5px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
    }

    .power-led {
      width: 8px; height: 8px; border-radius: 50%;
      background: #1a3a1a;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
      margin-top: auto;
      transition: all 0.4s;
    }
    .power-led.on { background: #00dd00; box-shadow: 0 0 6px #00ff00, 0 0 14px rgba(0,255,0,0.5), inset 0 1px 2px rgba(255,255,255,0.4); }

    /* ── Number-key channel entry display ── */
    #ch-input-display {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform: translate(-50%, 50%);
      font-size: 64px;
      font-weight: bold;
      color: var(--green);
      text-shadow: 0 0 20px rgba(57,255,20,0.9), 0 0 50px rgba(57,255,20,0.4);
      z-index: 35;
      pointer-events: none;
      display: none;
      letter-spacing: 4px;
    }
    #ch-input-display.visible { display: block; }

    /* ═══ TV GUIDE OVERLAY ══════════════════════════════════════════════════ */
    .guide-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .guide-overlay.open { opacity: 1; pointer-events: all; }

    .guide-panel {
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 8px;
      width: min(960px, 100%);
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 80px rgba(0,0,0,0.95);
    }
    .guide-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid #1a1a0a;
      background: #0d0d05;
    }
    .guide-title { font-size: 10px; letter-spacing: 4px; color: var(--green); text-transform: uppercase; text-shadow: 0 0 8px rgba(57,255,20,0.5); }
    .guide-close { background: none; border: none; color: rgba(245,240,232,0.35); font-size: 18px; cursor: pointer; line-height: 1; padding: 0 4px; }
    .guide-close:hover { color: var(--cream); }
    .guide-body  { overflow-y: auto; flex: 1; }

    .guide-channel-row {
      display: flex;
      border-bottom: 1px solid #151505;
      cursor: pointer;
      transition: background 0.1s;
    }
    .guide-channel-row:hover { background: rgba(57,255,20,0.04); }
    .guide-channel-row.active-ch { background: rgba(57,255,20,0.06); }

    .guide-ch-label {
      width: 120px; flex-shrink: 0;
      padding: 12px 16px;
      border-right: 1px solid #151505;
      display: flex; flex-direction: column; justify-content: center; gap: 2px;
    }
    .guide-ch-num  { font-size: 18px; font-weight: bold; }
    .guide-ch-name { font-size: 9px; color: rgba(245,240,232,0.4); letter-spacing: 1px; text-transform: uppercase; line-height: 1.3; }
    .guide-ch-era  { font-size: 8px; color: rgba(245,240,232,0.2); letter-spacing: 1px; margin-top: 2px; }

    .guide-programs { flex: 1; display: flex; align-items: stretch; overflow: hidden; padding: 8px 12px; gap: 6px; }
    .guide-program {
      min-width: 150px;
      background: rgba(255,255,255,0.03);
      border: 1px solid #1e1e0e;
      border-radius: 4px;
      padding: 8px 10px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .guide-program.now-airing { border-color: rgba(57,255,20,0.3); background: rgba(57,255,20,0.05); }
    .guide-program-time  { font-size: 8px; color: rgba(245,240,232,0.3); letter-spacing: 1px; }
    .guide-program.now-airing .guide-program-time { color: var(--green); }
    .guide-program-title { font-size: 10px; color: rgba(245,240,232,0.8); line-height: 1.3; }
    .guide-program-show  { font-size: 9px; color: rgba(245,240,232,0.3); }

    .keyboard-hint { font-size: 9px; color: rgba(245,240,232,0.12); letter-spacing: 2px; text-align: center; }
  </style>
</head>
<body>

  <div class="tv-set">
    <div class="tv-body">

      <div class="screen-section">
        <div class="screen-housing">
          <!-- This div is what goes fullscreen -->
          <div id="tv-screen">

            <div id="power-on" onclick="powerOn()">
              <div class="power-symbol">⏻</div>
              <div class="power-label">Click to turn on</div>
            </div>

            <canvas id="static-canvas"></canvas>
            <div id="player-container"></div>

            <div id="signal-lost">
              <div class="sl-icon">📡</div>
              <div class="sl-text">SIGNAL LOST</div>
              <div class="sl-sub" id="signal-lost-sub">Skipping...</div>
            </div>

            <!-- Channel number input (type digits on keyboard) -->
            <div id="ch-input-display"></div>

            <!-- OSD: Channel badge (brief, on channel change) -->
            <div id="osd-channel">
              <div class="osd-ch-num" id="osd-ch-num">--</div>
              <div class="osd-ch-name" id="osd-ch-name"></div>
            </div>

            <!-- OSD: Now Playing (fades in/out, always visible in fullscreen) -->
            <div id="osd-nowplaying">
              <div class="osd-np-inner">
                <span class="osd-np-ch"   id="osd-np-ch">--</span>
                <span class="osd-np-show" id="osd-np-show"></span>
                <span class="osd-np-sep">·</span>
                <span class="osd-np-title" id="osd-np-title">Stand by...</span>
                <span class="osd-np-year"  id="osd-np-year"></span>
                <span class="osd-np-rem"   id="osd-np-rem"></span>
              </div>
            </div>

            <div class="screen-glow"></div>
          </div>

          <!-- Now playing bar (below screen, normal mode only) -->
          <div class="now-playing-bar">
            <span class="np-ch-badge" id="np-ch">--</span>
            <span class="np-divider">|</span>
            <span class="np-show"  id="np-show">—</span>
            <span class="np-divider">·</span>
            <span class="np-title" id="np-title">Stand by...</span>
            <span class="np-year"  id="np-year"></span>
            <span class="np-rem"   id="np-rem"></span>
            <button class="skip-btn" onclick="skipEpisode()" title="Skip">⏭</button>
          </div>
        </div>

        <div class="tv-bottom-strip">
          <div class="brand-text">Nostalgic TV</div>
          <div class="bottom-btns">
            <button class="phys-btn-small" onclick="toggleGuide()">TV Guide</button>
            <button class="phys-btn-small" onclick="toggleFullscreen()">⛶ Full</button>
          </div>
        </div>
      </div>

      <!-- Right control panel -->
      <div class="control-panel">
        <div class="channel-display">
          <div class="ch-led-label">CH</div>
          <div class="ch-led-number" id="ch-display">--</div>
        </div>

        <div class="ctrl-group">
          <div class="ctrl-label">Power</div>
          <button class="phys-btn" onclick="powerOn()">⏻</button>
        </div>

        <div class="ctrl-group">
          <div class="ctrl-label">Channel</div>
          <div class="ch-pair">
            <button class="phys-btn" onclick="changeChannel(1)">▲</button>
            <button class="phys-btn" onclick="changeChannel(-1)">▼</button>
          </div>
        </div>

        <div class="knob-section">
          <div class="knob-label">Tune</div>

          directUrl: "https://archive.org/download/pinky-og-brain/Pinky%20and%20the%20Brain%20-%20S01E05%20-%20Brainstem.mp4" },
        { title: "Pinky and the Brain S01E06 - Hitchhike", show: "Pinky and the Brain", year: 1995, durationMins: 22,
          directUrl: "https://archive.org/download/pinky-og-brain/Pinky%20and%20the%20Brain%20-%20S01E06%20-%20Hitchhike.mp4" },
        { title: "Commercial Break", show: "Vintage Ads", year: 1995, durationMins: 5, isCommercial: true,
          directUrl: "https://archive.org/download/Collectionof90sCommercials/90s%20Commercials%20-%20S01.E4.mp4" },
        { title: "Pinky and the Brain S02E01", show: "Pinky and the Brain", year: 1996, durationMins: 22,
          directUrl: "https://archive.org/download/pinky-og-brain/Pinky%20and%20the%20Brain%20-%20S02E01%20-%20Inherit%20the%20Wheeze.mp4" },
        { title: "Pinky and the Brain S02E02", show: "Pinky and the Brain", year: 1996, durationMins: 22,
          directUrl: "https://archive.org/download/pinky-og-brain/Pinky%20and%20the%20Brain%20-%20S02E02%20-%20Brain%27s%20Song.mp4" },
        { title: "Commercial Break", show: "Vintage Ads", year: 1995, durationMins: 5, isCommercial: true,
          directUrl: "https://archive.org/download/Collectionof90sCommercials/90s%20Commercials%20-%20S01.E5.mp4" },
        { title: "Commercial Break", show: "Vintage Ads", year: 1995, durationMins: 5, isCommercial: true,
          directUrl: "https://archive.org/download/Collectionof90sCommercials/90s%20Commercials%20-%20S01.E6.mp4" },
        { title: "Commercial Break", show: "Vintage Ads", year: 1995, durationMins: 5, isCommercial: true,
          directUrl: "https://archive.org/download/Collectionof90sCommercials/90s%20Commercials%20-%20S01.E7.mp4" },
        { title: "Commercial Break", show: "Vintage Ads", year: 1995, durationMins: 5, isCommercial: true,
          directUrl: "https://archive.org/download/Collectionof90sCommercials/90s%20Commercials%20-%20S01.E8.mp4" },
      ]
    },
  ];

  // ─────────────────────────────────────────────────────────────────────────
  // BROADCAST SCHEDULER
  // Works out which episode is "on air" right now using real clock time,
  // so everyone tuning in sees the same moment in the same episode.
  // ─────────────────────────────────────────────────────────────────────────

  function getCurrentBroadcast(channel) {
    const now = Math.floor(Date.now() / 1000);
    const total = channel.playlist.reduce((s, ep) => s + ep.durationMins * 60, 0);
    if (!total) return null;
    const pos = now % total;
    let elapsed = 0;
    for (let i = 0; i < channel.playlist.length; i++) {
      const ep  = channel.playlist[i];
      const dur = ep.durationMins * 60;
      if (pos < elapsed + dur) {
        return { episode: ep, episodeIndex: i, startOffset: Math.floor(pos - elapsed), remainingSeconds: Math.floor(elapsed + dur - pos), channel };
      }
      elapsed += dur;
    }
    const ep0 = channel.playlist[0];
    return { episode: ep0, episodeIndex: 0, startOffset: 0, remainingSeconds: ep0.durationMins * 60, channel };
  }

  function getScheduleForChannel(channel, hoursAhead = 3) {
    const now   = Math.floor(Date.now() / 1000);
    const end   = now + hoursAhead * 3600;
    const total = channel.playlist.reduce((s, ep) => s + ep.durationMins * 60, 0);
    const schedule = [];
    let cursor = now - (now % total);
    while (cursor < end) {
      let off = 0;
      for (const ep of channel.playlist) {
        const s = cursor + off, e = s + ep.durationMins * 60;
        if (e > now && s < end) schedule.push({ episode: ep, startTime: s, endTime: e, isCurrentlyAiring: s <= now && e > now });
        off += ep.durationMins * 60;
      }
      cursor += total;
    }
    return schedule;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // APP STATE
  // ─────────────────────────────────────────────────────────────────────────

  let currentChannelIndex = 0;
  let currentEpisodeIndex = 0;
  let remainingTimer      = null;
  let tvOn                = false;
  let currentVideoEl      = null;
  let preloadVideoEl      = null;
  let staticInProgress    = false;
  let staticGeneration    = 0;

  // Channel OSD timer
  let osdChannelTimer = null;
  // Now-playing OSD fade timer
  let osdNpTimer = null;
  // Number key entry
  let chInputStr    = '';
  let chInputTimer  = null;

  // DOM refs
  const $  = id => document.getElementById(id);
  const screen     = $('tv-screen');
  const playerCont = $('player-container');
  const chDisplay  = $('ch-display');

  // ─────────────────────────────────────────────────────────────────────────
  // POWER ON
  // ─────────────────────────────────────────────────────────────────────────

  function powerOn() {
    const overlay = $('power-on');
    if (!overlay) return;
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.4s';
    setTimeout(() => overlay.remove(), 400);
    tvOn = true;
    setTimeout(() => $('power-led').classList.add('on'), 200);
    tuneToChannel(0);
  }

  // ─────────────────────────────────────────────────────────────────────────
  // STATIC (visual + audio)
  // ─────────────────────────────────────────────────────────────────────────

  const staticCanvas = $('static-canvas');
  const staticCtx    = staticCanvas.getContext('2d');
  let   staticRAF    = null;

  function startStatic() {
    staticCanvas.width  = 120;
    staticCanvas.height = 90;
    staticCanvas.style.display = 'block';
    const draw = () => {
      const w = staticCanvas.width, h = staticCanvas.height;
      const img = staticCtx.createImageData(w, h);
      const d   = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() * 255 | 0;
        d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
      }
      staticCtx.putImageData(img, 0, 0);
      staticRAF = requestAnimationFrame(draw);
    };
    draw();
  }

  function stopStatic() {
    if (staticRAF) { cancelAnimationFrame(staticRAF); staticRAF = null; }
    staticCanvas.style.display = 'none';
  }

  let staticAudioCtx = null, staticNoiseNode = null, staticGainNode = null;

  function startStaticAudio() {
    try {
      staticAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const sr = staticAudioCtx.sampleRate;
      const buf = staticAudioCtx.createBuffer(1, sr * 2, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      staticNoiseNode = staticAudioCtx.createBufferSource();
      staticNoiseNode.buffer = buf;
      staticNoiseNode.loop = true;
      const filter = staticAudioCtx.createBiquadFilter();
      filter.type = 'bandpass'; filter.frequency.value = 2000; filter.Q.value = 0.8;
      staticGainNode = staticAudioCtx.createGain();
      staticGainNode.gain.setValueAtTime(0, staticAudioCtx.currentTime);
      staticGainNode.gain.linearRampToValueAtTime(0.25, staticAudioCtx.currentTime + 0.05);
      staticNoiseNode.connect(filter); filter.connect(staticGainNode); staticGainNode.connect(staticAudioCtx.destination);
      staticNoiseNode.start();
    } catch(e) {}
  }

  function stopStaticAudio() {
    const ctx = staticAudioCtx, node = staticNoiseNode, gain = staticGainNode;
    staticAudioCtx = null; staticNoiseNode = null; staticGainNode = null;
    if (!ctx) return;
    try { if (gain) gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.05); } catch(e) {}
    setTimeout(() => { try { node.stop(); } catch(e) {} try { ctx.close(); } catch(e) {} }, 60);
  }

  // flashStatic: shows static for ~3s, kicks off video loading during static
  function flashStatic(loadFn, uiFn) {
    if (remainingTimer) { clearInterval(remainingTimer); remainingTimer = null; }
    if (currentVideoEl) { currentVideoEl.muted = true; currentVideoEl.pause(); }
    playerCont.innerHTML = '';
    currentVideoEl = null;
    staticInProgress = true;
    stopStaticAudio();
    const myGen = ++staticGeneration;
    startStatic();
    startStaticAudio();
    loadFn();
    setTimeout(() => {
      if (myGen !== staticGeneration) return;
      stopStatic(); stopStaticAudio();
      staticInProgress = false;
      if (currentVideoEl && currentVideoEl.dataset.errored) {
        showSignalLost('Video unavailable — skipping in 3s');
        setTimeout(() => skipEpisode(), 3000);
        return;
      }
      if (currentVideoEl) currentVideoEl.muted = false;
      uiFn();
    }, 3000);
  }

  // ─────────────────────────────────────────────────────────────────────────
  // VIDEO LOADING
  // ─────────────────────────────────────────────────────────────────────────

  function loadEpisode(episode, startOffset) {
    hideSignalLost();
    playerCont.innerHTML = '';
    currentVideoEl = null;

    const video = document.createElement('video');
    video.muted = true;
    video.playsInline = true;
    video.controls = false;

    video.addEventListener('loadedmetadata', () => {
      if (startOffset > 1) video.currentTime = startOffset;
      video.play().catch(() => {});
    }, { once: true });

    video.addEventListener('ended', () => skipEpisode(), { once: true });

    video.addEventListener('error', () => {
      if (staticInProgress) { video.dataset.errored = 'true'; return; }
      showSignalLost('Video unavailable — skipping in 3s');
      setTimeout(() => skipEpisode(), 3000);
    }, { once: true });

    video.src = episode.directUrl;
    video.autoplay = true;
    playerCont.appendChild(video);
    currentVideoEl = video;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // CHANNEL TUNING
  // ─────────────────────────────────────────────────────────────────────────

  function tuneToChannel(index) {
    currentChannelIndex = ((index % CHANNELS.length) + CHANNELS.length) % CHANNELS.length;
    const channel = CHANNELS[currentChannelIndex];

    chDisplay.textContent = channel.number;
    $('knob').style.transform = `rotate(${currentChannelIndex * (360 / CHANNELS.length)}deg)`;
    clearPreload();

    const bc = getCurrentBroadcast(channel);
    if (!bc) return;
    currentEpisodeIndex = bc.episodeIndex;

    showChannelOSD(channel);

    flashStatic(
      () => loadEpisode(bc.episode, bc.startOffset),
      () => { updateNowPlaying(channel, bc); startCountdown(channel, bc.remainingSeconds); showNowPlayingOSD(channel, bc); }
    );
  }

  function changeChannel(direction) {
    if (!tvOn) { powerOn(); return; }
    tuneToChannel(currentChannelIndex + direction);
  }

  // Jump directly to a channel by its number
  function tuneToChannelNumber(num) {
    const idx = CHANNELS.findIndex(c => c.number === num);
    if (idx >= 0) tuneToChannel(idx);
  }

  // ─────────────────────────────────────────────────────────────────────────
  // EPISODE SKIP
  // ─────────────────────────────────────────────────────────────────────────

  function skipEpisode() {
    hideSignalLost();
    const channel = CHANNELS[currentChannelIndex];
    const nextIndex = (currentEpisodeIndex + 1) % channel.playlist.length;
    const ep = channel.playlist[nextIndex];
    currentEpisodeIndex = nextIndex;

    const fakeBc = { episode: ep, episodeIndex: nextIndex, startOffset: 0, remainingSeconds: ep.durationMins * 60, channel };

    flashStatic(
      () => {
        if (preloadVideoEl && preloadVideoEl.dataset.url === ep.directUrl) {
          const v = preloadVideoEl; preloadVideoEl = null;
          v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;';
          v.muted = true; v.currentTime = 0;
          playerCont.innerHTML = ''; playerCont.appendChild(v);
          currentVideoEl = v;
          v.play().catch(() => {});
          v.addEventListener('ended', () => skipEpisode(), { once: true });
        } else {
          clearPreload();
          loadEpisode(ep, 0);
        }
      },
      () => { updateNowPlaying(channel, fakeBc); startCountdown(channel, ep.durationMins * 60); showNowPlayingOSD(channel, fakeBc); }
    );
  }

  // ─────────────────────────────────────────────────────────────────────────
  // PRELOADING
  // ─────────────────────────────────────────────────────────────────────────

  function preloadNextEpisode(channel, episodeIndex) {
    const nextIdx = (episodeIndex + 1) % channel.playlist.length;
    const nextEp  = channel.playlist[nextIdx];
    if (!nextEp || !nextEp.directUrl) return;
    if (preloadVideoEl && preloadVideoEl.dataset.url === nextEp.directUrl) return;
    clearPreload();
    const v = document.createElement('video');
    v.dataset.url = nextEp.directUrl;
    v.src = nextEp.directUrl;
    v.preload = 'auto'; v.muted = true;
    v.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;left:-9999px;top:-9999px;';
    document.body.appendChild(v);
    preloadVideoEl = v;
  }

  function clearPreload() {
    if (preloadVideoEl) { preloadVideoEl.src = ''; preloadVideoEl.remove(); preloadVideoEl = null; }
  }

  // ─────────────────────────────────────────────────────────────────────────
  // NOW PLAYING — BAR + OSD
  // ─────────────────────────────────────────────────────────────────────────

  function updateNowPlaying(channel, bc) {
    const ep = bc.episode;
    $('np-ch').textContent  = `CH ${channel.number}`;
    $('np-ch').style.background = channel.color;
    $('np-show').textContent  = ep.show;
    $('np-title').textContent = ep.title;
    $('np-year').textContent  = ep.year;
    updateRemaining(bc.remainingSeconds);
  }

  function startCountdown(channel, secs) {
    let s = secs, didPreload = false;
    remainingTimer = setInterval(() => {
      s--;
      updateRemaining(s);
      if (!didPreload && s === 60) { didPreload = true; preloadNextEpisode(channel, currentEpisodeIndex); }
      if (s <= 0) {
        clearInterval(remainingTimer);
        const bc = getCurrentBroadcast(channel);
        if (bc && bc.episodeIndex !== currentEpisodeIndex) {
          currentEpisodeIndex = bc.episodeIndex;
          loadEpisode(bc.episode, bc.startOffset);
          updateNowPlaying(channel, bc); startCountdown(channel, bc.remainingSeconds);
        }
      }
    }, 1000);
  }

  function updateRemaining(secs) {
    const txt = secs > 0 ? `${Math.floor(secs / 60)}:${String(secs % 60).padStart(2, '0')} left` : '';
    $('np-rem').textContent = txt;
    $('osd-np-rem').textContent = txt;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // OSD (On-Screen Display)
  // ─────────────────────────────────────────────────────────────────────────

  function showChannelOSD(channel) {
    $('osd-ch-num').textContent  = `CH ${String(channel.number).padStart(2, '0')}`;
    $('osd-ch-name').textContent = channel.name;
    const el = $('osd-channel');
    el.classList.add('visible');
    clearTimeout(osdChannelTimer);
    osdChannelTimer = setTimeout(() => el.classList.remove('visible'), 3000);
  }

  function showNowPlayingOSD(channel, bc) {
    const ep = bc.episode;
    $('osd-np-ch').textContent    = `CH ${channel.number}`;
    $('osd-np-ch').style.background = channel.color;
    $('osd-np-show').textContent  = ep.show;
    $('osd-np-title').textContent = ep.title;
    $('osd-np-year').textContent  = ep.year;
    const el = $('osd-nowplaying');
    el.classList.add('visible');
    // Brief flash then fade — stays visible in fullscreen
    requestAnimationFrame(() => { el.classList.add('show'); });
    clearTimeout(osdNpTimer);
    // In fullscreen, keep showing; out of fullscreen, hide after 5s
    if (!document.fullscreenElement) {
      osdNpTimer = setTimeout(() => el.classList.remove('show'), 5000);
    }
  }

  document.addEventListener('fullscreenchange', () => {
    const el = $('osd-nowplaying');
    if (document.fullscreenElement) {
      el.classList.add('visible', 'show');
      clearTimeout(osdNpTimer);
    } else {
      osdNpTimer = setTimeout(() => el.classList.remove('show'), 5000);
    }
  });

  // ─────────────────────────────────────────────────────────────────────────
  // SIGNAL LOST
  // ─────────────────────────────────────────────────────────────────────────

  function showSignalLost(msg) {
    $('signal-lost-sub').textContent = msg || 'Skipping...';
    $('signal-lost').classList.add('visible');
  }
  function hideSignalLost() { $('signal-lost').classList.remove('visible'); }

  // ─────────────────────────────────────────────────────────────────────────
  // FULLSCREEN
  // ─────────────────────────────────────────────────────────────────────────

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      screen.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }

  // ─────────────────────────────────────────────────────────────────────────
  // TV GUIDE
  // ─────────────────────────────────────────────────────────────────────────

  function toggleGuide() {
    const ol = $('guide-overlay');
    const open = ol.classList.toggle('open');
    if (open) renderGuide();
  }

  function handleGuideClick(e) {
    if (e.target === $('guide-overlay')) toggleGuide();
  }

  function renderGuide() {
    const body = $('guide-body');
    body.innerHTML = CHANNELS.map((ch, idx) => {
      const schedule = getScheduleForChannel(ch, 3);
      const programs = schedule.slice(0, 4).map(s => {
        const t = new Date(s.startTime * 1000);
        const timeStr = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `<div class="guide-program ${s.isCurrentlyAiring ? 'now-airing' : ''}">
          <div class="guide-program-time">${s.isCurrentlyAiring ? '▶ NOW' : timeStr}</div>
          <div class="guide-program-title">${s.episode.title}</div>
          <div class="guide-program-show">${s.episode.show}</div>
        </div>`;
      }).join('');
      const isActive = idx === currentChannelIndex;
      return `<div class="guide-channel-row ${isActive ? 'active-ch' : ''}" onclick="selectFromGuide(${idx})">
        <div class="guide-ch-label">
          <div class="guide-ch-num" style="color:${ch.color};text-shadow:0 0 6px ${ch.color}40">${ch.number}</div>
          <div class="guide-ch-name">${ch.name}</div>
          <div class="guide-ch-era">${ch.era}</div>
        </div>
        <div class="guide-programs">${programs}</div>
      </div>`;
    }).join('');
  }

  function selectFromGuide(index) {
    toggleGuide();
    tuneToChannel(index);
  }

  // ─────────────────────────────────────────────────────────────────────────
  // KEYBOARD CONTROLS
  // ─────────────────────────────────────────────────────────────────────────

  document.addEventListener('keydown', e => {
    if (!tvOn && e.key !== ' ' && e.key !== 'Enter') { powerOn(); return; }

    // Number keys: accumulate digits, navigate after pause
    if (e.key >= '0' && e.key <= '9') {
      chInputStr += e.key;
      $('ch-input-display').textContent = chInputStr;
      $('ch-input-display').classList.add('visible');
      clearTimeout(chInputTimer);
      chInputTimer = setTimeout(() => {
        const num = parseInt(chInputStr, 10);
        chInputStr = '';
        $('ch-input-display').classList.remove('visible');
        tuneToChannelNumber(num);
      }, 1500);
      return;
    }

    // Clear number input on any non-digit key
    if (chInputStr) {
      chInputStr = ''; clearTimeout(chInputTimer);
      $('ch-input-display').classList.remove('visible');
    }

    const guide = $('guide-overlay');
    if (e.key === 'Escape' && guide.classList.contains('open')) { toggleGuide(); return; }

    switch (e.key) {
      case 'ArrowRight': case 'ArrowUp':   changeChannel(1);  break;
      case 'ArrowLeft':  case 'ArrowDown': changeChannel(-1); break;
      case 'g': case 'G': toggleGuide(); break;
      case 'f': case 'F': toggleFullscreen(); break;
      case 's': case 'S': if (tvOn) skipEpisode(); break;
      case 'i': case 'I':
        const ch = CHANNELS[currentChannelIndex];
        const bc = getCurrentBroadcast(ch);
        if (bc) showNowPlayingOSD(ch, bc);
        break;
    }
  });
  </script>
